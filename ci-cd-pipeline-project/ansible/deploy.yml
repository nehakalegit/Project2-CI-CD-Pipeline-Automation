- name: Deploy Static Website
  hosts: web
  become: true

  tasks:

    - name: Wait for system to be ready (simple sleep)
      pause:
        seconds: 30

    - name: Wait for yum lock to be released
      shell: |
        while fuser /var/run/yum.pid >/dev/null 2>&1; do
          sleep 5
        done

    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Copy HTML file
      copy:
        src: ../app/index.html
        dest: /usr/share/nginx/html/index.html
        mode: '0644'
